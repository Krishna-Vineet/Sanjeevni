version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=sanjeevni
      - POSTGRES_PASSWORD=sanjeevni
      - POSTGRES_DB=sanjeevni
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: .
    volumes:
      - .:/backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sanjeevni:sanjeevni@db/sanjeevni
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - rabbitmq
      - redis

  worker:
    build: .
    command: celery -A app.worker worker --loglevel=info
    volumes:
      - .:/backend
    environment:
      - DATABASE_URL=postgresql://sanjeevni:sanjeevni@db/sanjeevni
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - rabbitmq
      - redis

volumes:
  postgres_data:
